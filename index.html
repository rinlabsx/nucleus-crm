<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nucleus CRM — Studio Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0e0f11;
  --surface: #16181c;
  --surface2: #1c1f24;
  --surface3: #22262d;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.10);
  --text: #e8eaf0;
  --text2: #8b909c;
  --text3: #555a66;
  --accent: #4f7cff;
  --accent-dim: rgba(79,124,255,0.12);
  --green: #34d399;
  --green-dim: rgba(52,211,153,0.12);
  --amber: #fbbf24;
  --amber-dim: rgba(251,191,36,0.12);
  --red: #f87171;
  --red-dim: rgba(248,113,113,0.12);
  --purple: #a78bfa;
  --purple-dim: rgba(167,139,250,0.12);
  --radius: 8px;
  --radius-lg: 12px;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  overflow: hidden;
  font-size: 13px;
}

.app {
  display: grid;
  grid-template-columns: 52px 240px minmax(0,1fr) 280px;
  width: 100%;
  height: 100vh;
}

.nav {
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 0;
  gap: 6px;
}

.nav-logo {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 500;
  color: #fff;
  margin-bottom: 14px;
  font-family: var(--mono);
}

.nav-icon {
  width: 36px; height: 36px;
  border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--text3);
  transition: all 0.15s;
  font-size: 16px;
}
.nav-icon:hover { background: var(--surface3); color: var(--text2); }
.nav-icon.active { background: var(--accent-dim); color: var(--accent); }
.nav-icon svg { width: 16px; height: 16px; }

.nav-bottom { margin-top: auto; }

.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-head {
  padding: 18px 16px 12px;
  border-bottom: 1px solid var(--border);
}

.sidebar-title {
  font-size: 11px;
  font-weight: 500;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 12px;
}

.search {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 7px 10px;
  color: var(--text3);
  font-size: 12px;
  font-family: var(--font);
}
.search svg { width: 13px; height: 13px; flex-shrink: 0; }
.search input { background: none; border: none; outline: none; color: var(--text); font-family: var(--font); font-size: 12px; width: 100%; }
.search input::placeholder { color: var(--text3); }

.filter-tabs {
  display: flex;
  gap: 4px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
}

.ftab {
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  color: var(--text3);
  transition: all 0.15s;
}
.ftab.active { background: var(--accent-dim); color: var(--accent); }
.ftab:hover:not(.active) { color: var(--text2); }

.client-list { overflow-y: auto; flex: 1; }
.client-list::-webkit-scrollbar { width: 3px; }
.client-list::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

.client-item {
  padding: 12px 16px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.12s;
  display: flex;
  align-items: center;
  gap: 10px;
}
.client-item:hover { background: var(--surface2); }
.client-item.active { background: var(--surface3); }

.avatar {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 500;
  flex-shrink: 0;
  font-family: var(--mono);
}

.client-info { flex: 1; min-width: 0; }
.client-name { font-weight: 500; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.client-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }

.badge {
  font-size: 10px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 20px;
  white-space: nowrap;
  font-family: var(--mono);
}
.badge-green { background: var(--green-dim); color: var(--green); }
.badge-amber { background: var(--amber-dim); color: var(--amber); }
.badge-red { background: var(--red-dim); color: var(--red); }
.badge-purple { background: var(--purple-dim); color: var(--purple); }
.badge-blue { background: var(--accent-dim); color: var(--accent); }

.main {
  background: var(--bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.topbar {
  padding: 0 24px;
  height: 52px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.topbar-left { display: flex; align-items: center; gap: 10px; }
.page-title { font-size: 14px; font-weight: 500; }
.page-sub { font-size: 12px; color: var(--text3); }

.topbar-actions { display: flex; align-items: center; gap: 8px; }

.btn {
  padding: 6px 12px;
  border-radius: var(--radius);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  font-family: var(--font);
  border: none;
  transition: all 0.15s;
}
.btn-ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--border2); color: var(--text); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { opacity: 0.9; }

.main-content { padding: 24px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 20px; }
.main-content::-webkit-scrollbar { width: 3px; }
.main-content::-webkit-scrollbar-thumb { background: var(--surface2); }

.metrics { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 12px; }

.metric-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
}
.metric-label { font-size: 11px; color: var(--text3); margin-bottom: 8px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }
.metric-value { font-size: 24px; font-weight: 300; color: var(--text); font-family: var(--mono); letter-spacing: -0.02em; }
.metric-delta { font-size: 11px; margin-top: 6px; display: flex; align-items: center; gap: 4px; }
.delta-up { color: var(--green); }
.delta-dn { color: var(--red); }

.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.section-title { font-size: 13px; font-weight: 500; }
.section-action { font-size: 11px; color: var(--accent); cursor: pointer; }

.projects-table {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

table { width: 100%; border-collapse: collapse; }
thead tr { border-bottom: 1px solid var(--border); }
th { padding: 10px 16px; text-align: left; font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }
td { padding: 12px 16px; font-size: 12px; color: var(--text2); border-bottom: 1px solid var(--border); }
tbody tr:last-child td { border-bottom: none; }
tbody tr { transition: background 0.1s; cursor: pointer; }
tbody tr:hover td { background: var(--surface2); }
td.primary { color: var(--text); font-weight: 500; }

.progress-bar { width: 80px; height: 4px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; background: var(--accent); }
.progress-fill.done { background: var(--green); }
.progress-fill.warn { background: var(--amber); }

.progress-wrap { display: flex; align-items: center; gap: 8px; }
.progress-pct { font-size: 11px; color: var(--text3); font-family: var(--mono); }

.right-panel {
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-head {
  padding: 18px 18px 14px;
  border-bottom: 1px solid var(--border);
}

.client-profile { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.client-profile .avatar { width: 40px; height: 40px; border-radius: 10px; font-size: 14px; }
.client-profile-name { font-size: 14px; font-weight: 500; }
.client-profile-role { font-size: 11px; color: var(--text3); margin-top: 2px; }

.meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.meta-item { background: var(--surface2); border-radius: var(--radius); padding: 10px; }
.meta-key { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.meta-val { font-size: 12px; font-weight: 500; color: var(--text); font-family: var(--mono); }

.panel-body { padding: 16px 18px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 18px; }
.panel-body::-webkit-scrollbar { width: 3px; }
.panel-body::-webkit-scrollbar-thumb { background: var(--surface3); }

.panel-section-title { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }

.invoice-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.invoice-item:last-child { border-bottom: none; }
.invoice-id { font-family: var(--mono); font-size: 11px; color: var(--text3); }
.invoice-name { font-size: 12px; color: var(--text); margin-top: 2px; }
.invoice-amount { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--text); }

.note-item {
  padding: 10px 12px;
  background: var(--surface2);
  border-radius: var(--radius);
  border-left: 2px solid var(--accent);
  margin-bottom: 8px;
}
.note-text { font-size: 12px; color: var(--text2); line-height: 1.6; }
.note-date { font-size: 10px; color: var(--text3); margin-top: 5px; font-family: var(--mono); }

.activity-item { display: flex; gap: 10px; padding: 6px 0; }
.activity-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-top: 4px; flex-shrink: 0; }
.activity-text { font-size: 12px; color: var(--text2); line-height: 1.5; }
.activity-time { font-size: 10px; color: var(--text3); font-family: var(--mono); margin-top: 2px; }
</style>
</head>
<body>
<div class="app">

<script>
const CLIENTS = [
  { id:1, name:'Mira Health', initials:'MH', color:'#4f7cff', colorDim:'rgba(79,124,255,0.15)', contact:'Sara Okonkwo', role:'Head of Product', status:'active', mrr:'$4,200', since:'Jan 2025', projects:3, outstanding:'$8,400', industry:'HealthTech' },
  { id:2, name:'Luma Studio', initials:'LS', color:'#a78bfa', colorDim:'rgba(167,139,250,0.15)', contact:'Tom Reyes', role:'Creative Director', status:'active', mrr:'$2,800', since:'Jun 2024', projects:2, outstanding:'$2,800', industry:'Design Agency' },
  { id:3, name:'Orbit Logistics', initials:'OL', color:'#34d399', colorDim:'rgba(52,211,153,0.15)', contact:'Jan Müller', role:'CTO', status:'hold', mrr:'$6,500', since:'Mar 2024', projects:1, outstanding:'$13,000', industry:'Logistics' },
  { id:4, name:'Flowbase', initials:'FB', color:'#fbbf24', colorDim:'rgba(251,191,36,0.15)', contact:'Ana Lima', role:'CEO', status:'active', mrr:'$1,900', since:'Oct 2025', projects:2, outstanding:'$1,900', industry:'SaaS Startup' },
  { id:5, name:'Crane & Bell', initials:'CB', color:'#f87171', colorDim:'rgba(248,113,113,0.15)', contact:'David Park', role:'Operations Lead', status:'done', mrr:'—', since:'Feb 2024', projects:4, outstanding:'$0', industry:'Architecture' },
  { id:6, name:'Dusk Media', initials:'DM', color:'#4f7cff', colorDim:'rgba(79,124,255,0.15)', contact:'Priya Nair', role:'Marketing Dir.', status:'active', mrr:'$3,100', since:'Aug 2025', projects:1, outstanding:'$3,100', industry:'Media' },
];

const PROJECTS = [
  { name:'Patient portal redesign', client:'Mira Health', clientId:1, status:'active', pct:68, deadline:'Apr 12', value:'$14,000' },
  { name:'Design system v2', client:'Luma Studio', clientId:2, status:'review', pct:92, deadline:'Mar 30', value:'$6,500' },
  { name:'Fleet tracker MVP', client:'Orbit Logistics', clientId:3, status:'hold', pct:41, deadline:'May 20', value:'$22,000' },
  { name:'Onboarding flow', client:'Flowbase', clientId:4, status:'active', pct:55, deadline:'Apr 5', value:'$4,800' },
  { name:'Brand dashboard', client:'Dusk Media', clientId:6, status:'active', pct:29, deadline:'May 1', value:'$7,200' },
  { name:'API integration', client:'Mira Health', clientId:1, status:'active', pct:80, deadline:'Apr 8', value:'$5,600' },
];

const INVOICES = {
  1:[{id:'INV-041',name:'Portal redesign — Phase 1',amount:'$4,200',badge:'badge-green',btext:'Paid'},{id:'INV-042',name:'Portal redesign — Phase 2',amount:'$4,200',badge:'badge-amber',btext:'Due Apr 1'}],
  2:[{id:'INV-038',name:'Design system retainer',amount:'$2,800',badge:'badge-green',btext:'Paid'}],
  3:[{id:'INV-035',name:'Fleet tracker — kickoff',amount:'$6,500',badge:'badge-amber',btext:'Overdue'},{id:'INV-036',name:'Fleet tracker — milestone 1',amount:'$6,500',badge:'badge-red',btext:'On hold'}],
  4:[{id:'INV-043',name:'Onboarding flow — full',amount:'$1,900',badge:'badge-amber',btext:'Due Apr 10'}],
  5:[{id:'INV-029',name:'Brand identity',amount:'$8,000',badge:'badge-green',btext:'Paid'},{id:'INV-030',name:'Web dev — final',amount:'$12,000',badge:'badge-green',btext:'Paid'}],
  6:[{id:'INV-044',name:'Brand dashboard — deposit',amount:'$3,100',badge:'badge-green',btext:'Paid'}],
};

const NOTES = {
  1:['Wants a mobile-first approach for the portal. Check with Sara on HIPAA compliance for data display.','Referred by Luma Studio — flag for referral discount on next renewal.'],
  2:['Tom prefers async comms over calls. Slack channel preferred.'],

  3:['Project set to hold','Last call with Jan Müller','Scope document signed'],
  4:['Onboarding wireframes approved','Kickoff call completed'],
  5:['Final invoice paid','Project marked complete','Handoff call done'],
  6:['Deposit invoice paid','Discovery session completed'],

const STATUS_MAP = {
  active:{cls:'badge-green',txt:'Active'},
  review:{cls:'badge-purple',txt:'In review'},

let selectedClient = null;

function renderClients(){
  const list = document.getElementById('clientList');
  list.innerHTML = CLIENTS.map(c=>`
    <div class="client-item${selectedClient===c.id?' active':''}" onclick="selectClient(${c.id})">
      <div class="avatar" style="background:${c.colorDim};color:${c.color}">${c.initials}</div>
      <div class="client-info">
        <div class="client-name">${c.name}</div>
        <div class="client-sub">${c.industry}</div>
      </div>
      <span class="badge ${c.status==='active'?'badge-green':c.status==='hold'?'badge-amber':'badge-blue'}">${c.status==='active'?'Active':c.status==='hold'?'Hold':'Done'}</span>
    </div>
  `).join('');
}

function renderMetrics(clientId){
  const container = document.getElementById('metrics');
  if(!clientId){
    const activeClients = CLIENTS.filter(c=>c.status==='active').length;
    const totalMRR = CLIENTS.filter(c=>c.mrr!=='—').reduce((s,c)=>s+parseInt(c.mrr.replace(/\D/g,'')),0);
    const activeProjects = PROJECTS.filter(p=>p.status==='active').length;
    const outstanding = CLIENTS.reduce((s,c)=>s+parseInt(c.outstanding.replace(/\D/g,'')),0);
    container.innerHTML = `
      <div class="metric-card"><div class="metric-label">Active clients</div><div class="metric-value">${activeClients}</div><div class="metric-delta delta-up">↑ 2 this quarter</div></div>
      <div class="metric-card"><div class="metric-label">Monthly recurring</div><div class="metric-value">$${totalMRR.toLocaleString()}</div><div class="metric-delta delta-up">↑ 12% vs last month</div></div>
      <div class="metric-card"><div class="metric-label">Active projects</div><div class="metric-value">${activeProjects}</div><div class="metric-delta delta-up">↑ 1 this week</div></div>
      <div class="metric-card"><div class="metric-label">Outstanding</div><div class="metric-value">$${outstanding.toLocaleString()}</div><div class="metric-delta delta-dn">↓ 2 invoices overdue</div></div>`;
  } else {
    const c = CLIENTS.find(x=>x.id===clientId);
    const cp = PROJECTS.filter(p=>p.clientId===clientId);
    container.innerHTML = `
      <div class="metric-card"><div class="metric-label">Monthly value</div><div class="metric-value">${c.mrr}</div><div class="metric-delta delta-up">↑ Active retainer</div></div>
      <div class="metric-card"><div class="metric-label">Projects</div><div class="metric-value">${c.projects}</div><div class="metric-delta" style="color:var(--text3)">${cp.length} currently active</div></div>
      <div class="metric-card"><div class="metric-label">Outstanding</div><div class="metric-value">${c.outstanding}</div><div class="metric-delta" style="color:var(--text3)">This client</div></div>
      <div class="metric-card"><div class="metric-label">Client since</div><div class="metric-value" style="font-size:18px">${c.since}</div><div class="metric-delta" style="color:var(--text3)">Long-term client</div></div>`;
  }
}

function renderProjects(clientId){
  const rows = clientId ? PROJECTS.filter(p=>p.clientId===clientId) : PROJECTS;
  const body = document.getElementById('projectsBody');
  body.innerHTML = rows.map(p=>{
    const s = STATUS_MAP[p.status];
    const fillClass = p.pct>=80?'done':p.pct<40?'warn':'';
    return `<tr>
      <td class="primary">${p.name}</td>
      <td>${p.client}</td>
      <td><span class="badge ${s.cls}">${s.txt}</span></td>
      <td><div class="progress-wrap"><div class="progress-bar"><div class="progress-fill ${fillClass}" style="width:${p.pct}%"></div></div><span class="progress-pct">${p.pct}%</span></div></td>
      <td>${p.deadline}</td>
      <td style="font-family:var(--mono);color:var(--text)">${p.value}</td>
    </tr>`;
  }).join('');
}

function renderRightPanel(clientId){
  const panel = document.getElementById('rightPanel');
  if(!clientId){ panel.innerHTML=''; return; }
  const c = CLIENTS.find(x=>x.id===clientId);
  const invs = INVOICES[clientId]||[];
  const notes = NOTES[clientId]||[];
  const acts = (ACTIVITY[clientId]||[]).slice(0,4);

  panel.innerHTML = `
    <div class="panel-head">
      <div class="client-profile">
        <div class="avatar" style="background:${c.colorDim};color:${c.color}">${c.initials}</div>
        <div>
          <div class="client-profile-name">${c.name}</div>
          <div class="client-profile-role">${c.contact} · ${c.role}</div>
        </div>
      </div>
      <div class="meta-grid">
        <div class="meta-item"><div class="meta-key">Industry</div><div class="meta-val" style="font-size:11px;font-family:var(--font)">${c.industry}</div></div>
        <div class="meta-item"><div class="meta-key">Since</div><div class="meta-val">${c.since}</div></div>
        <div class="meta-item"><div class="meta-key">MRR</div><div class="meta-val">${c.mrr}</div></div>
        <div class="meta-item"><div class="meta-key">Status</div><div class="meta-val" style="font-size:11px;font-family:var(--font)">${c.status==='active'?'Active':c.status==='hold'?'On hold':'Completed'}</div></div>
      </div>
    </div>
    <div class="panel-body">
      <div>
        <div class="panel-section-title">Invoices</div>
        ${invs.map(inv=>`
          <div class="invoice-item">
            <div>
              <div class="invoice-id">${inv.id}</div>
              <div class="invoice-name">${inv.name}</div>
            </div>
            <div style="text-align:right">
              <div class="invoice-amount">${inv.amount}</div>
              <span class="badge ${inv.badge}" style="margin-top:4px;display:inline-block">${inv.btext}</span>
            </div>
          </div>`).join('')}
      </div>
      <div>
        <div class="panel-section-title">Notes</div>
        ${notes.map(n=>`
          <div class="note-item">
            <div class="note-text">${n}</div>
            <div class="note-date">Mar 2026</div>
          </div>`).join('')}
      </div>
      <div>
        <div class="panel-section-title">Recent activity</div>
        ${acts.map((a,i)=>`
          <div class="activity-item">
            <div class="activity-dot"></div>
            <div>
              <div class="activity-text">${a}</div>
              <div class="activity-time">${TIMES[i]}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
}

function selectClient(id){
  selectedClient = selectedClient===id ? null : id;
  const c = CLIENTS.find(x=>x.id===id);
  document.getElementById('mainTitle').textContent = selectedClient ? c.name : 'Studio Overview';
  document.getElementById('mainSub').textContent = selectedClient ? c.industry : 'March 2026';
  renderClients();
  renderMetrics(selectedClient);
  renderProjects(selectedClient);
  renderRightPanel(selectedClient);
}

renderClients();
renderMetrics(null);
renderProjects(null);
renderRightPanel(null);
</script>
</body>
</html>
